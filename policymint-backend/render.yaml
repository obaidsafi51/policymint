services:
  - type: web
    name: policymint-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build && mkdir -p bin && curl --proto '=https' --tlsv1.2 -LsSf https://github.com/krakenfx/kraken-cli/releases/latest/download/kraken-cli-installer.sh | sh && (cp ~/.cargo/bin/kraken bin/kraken 2>/dev/null || cp /opt/render/.cargo/bin/kraken bin/kraken) && chmod +x bin/kraken
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALCHEMY_RPC_URL
        sync: false
      - key: OPERATOR_WALLET_PRIVATE_KEY
        sync: false
      - key: AGENT_WALLET_PRIVATE_KEY
        sync: false
      - key: RISK_ROUTER_ADDRESS
        sync: false
      - key: HACKATHON_VAULT_ADDRESS
        sync: false
      - key: IDENTITY_REGISTRY_ADDRESS
        sync: false
      - key: VALIDATION_REGISTRY_ADDRESS
        sync: false
      - key: REPUTATION_REGISTRY_ADDRESS
        sync: false
      - key: PRISM_API_KEY
        sync: false
      - key: PRISM_BASE_URL
        value: https://api.prismapi.ai
      - key: INTERNAL_SERVICE_KEY
        sync: false
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: KRAKEN_CLI_PATH
        value: ./bin/kraken
      - key: KRAKEN_PAPER_TRADING
        value: "true"
      - key: KRAKEN_EXECUTION_ENABLED
        value: "false"
      - key: HACKATHON_START_TS
        sync: false
      - key: STRATEGY_TICK_INTERVAL_MS
        value: "450000"

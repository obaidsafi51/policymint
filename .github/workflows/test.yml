name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: policymint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d policymint_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/policymint_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/policymint_test
      API_KEY_SALT_ROUNDS: 4
      JWT_SECRET: test-jwt-secret-at-least-32-characters-long
      ALCHEMY_RPC_URL: https://base-sepolia.g.alchemy.com/v2/test
      BASE_SEPOLIA_RPC_FALLBACK: https://sepolia.base.org
      CHAIN_ID: 84532
      RUN_DB_TESTS: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: policymint-backend/package-lock.json

      - name: Install dependencies
        working-directory: policymint-backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: policymint-backend
        run: npx prisma generate

      - name: Apply migrations
        working-directory: policymint-backend
        run: npx prisma migrate deploy

      - name: Type check
        working-directory: policymint-backend
        run: npm run typecheck

      - name: Run tests
        working-directory: policymint-backend
        run: npm run test
